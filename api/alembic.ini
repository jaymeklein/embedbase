[alembic]
# %(here)s resolves to the directory containing this file (/app/api inside the container)
script_location = %(here)s/alembic

# sqlalchemy.url is overridden programmatically in db.py so settings.database_path
# is always used.  This value is a fallback for running alembic from the CLI.
sqlalchemy.url = sqlite+aiosqlite:////app/data/embedbase.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
