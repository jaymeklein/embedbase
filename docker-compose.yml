version: "3.9"

networks:
  embedbase_net:
    driver: bridge

volumes:
  embedbase_data:
  redis_data:

services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    image: embedbase/api:1.0.0
    environment:
      - VECTOR_STORE=${VECTOR_STORE:-chroma}
      - EMBEDDING_PROVIDER=${EMBEDDING_PROVIDER:-ollama}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-embeddinggemma}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - CHROMA_HOST=${CHROMA_HOST:-chroma}
      - CHROMA_PORT=${CHROMA_PORT:-8000}
      - CHROMA_AUTH_TOKEN=${CHROMA_AUTH_TOKEN:-embedbase-internal}
      - DATABASE_PATH=/store/embedbase.db
      - MASTER_API_KEY=${MASTER_API_KEY}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_FORMAT=${LOG_FORMAT:-json}
      - MAX_FILE_SIZE_MB=${MAX_FILE_SIZE_MB:-50}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000}
      - EMBEDBASE_SECURE_HEADERS=${EMBEDBASE_SECURE_HEADERS:-false}
      # LAN IP the console advertises for other devices. A bridge-networked
      # container can't detect the host's LAN IP, so set LAN_HOST in .env to a
      # fixed value; blank falls back to in-container socket detection.
      - LAN_HOST=${LAN_HOST:-}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - OLLAMA_CONCURRENCY=${OLLAMA_CONCURRENCY:-8}
      - OPENAI_COMPAT_BASE_URL=${OPENAI_COMPAT_BASE_URL:-http://host.docker.internal:1234}
      - OPENAI_COMPAT_API_KEY=${OPENAI_COMPAT_API_KEY:-}
      - DOCLING_ARTIFACTS_PATH=${DOCLING_ARTIFACTS_PATH:-}
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/api
    volumes:
      - embedbase_data:/data
      - ./data/store:/store
      - ./config.yaml:/app/config.yaml
      - ./api:/app/api   # bind-mount: edits on host are visible instantly; --reload picks them up
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      redis:
        condition: service_healthy
      chroma:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks: [embedbase_net]

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    image: embedbase/worker:1.0.0
    environment:
      - VECTOR_STORE=${VECTOR_STORE:-chroma}
      - EMBEDDING_PROVIDER=${EMBEDDING_PROVIDER:-ollama}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-embeddinggemma}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - CHROMA_HOST=${CHROMA_HOST:-chroma}
      - CHROMA_PORT=${CHROMA_PORT:-8000}
      - CHROMA_AUTH_TOKEN=${CHROMA_AUTH_TOKEN:-embedbase-internal}
      - DATABASE_PATH=/store/embedbase.db
      - MASTER_API_KEY=${MASTER_API_KEY}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_FORMAT=${LOG_FORMAT:-json}
      - CELERY_CONCURRENCY=${CELERY_CONCURRENCY:-2}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - OLLAMA_CONCURRENCY=${OLLAMA_CONCURRENCY:-8}
      - OPENAI_COMPAT_BASE_URL=${OPENAI_COMPAT_BASE_URL:-http://host.docker.internal:1234}
      - OPENAI_COMPAT_API_KEY=${OPENAI_COMPAT_API_KEY:-}
      - DOCLING_ARTIFACTS_PATH=${DOCLING_ARTIFACTS_PATH:-}
    command: watchfiles "celery -A worker.celery_app worker --loglevel=info --concurrency=1" /app/worker
    volumes:
      - embedbase_data:/data
      - ./data/store:/store
      - ./config.yaml:/app/config.yaml
      - ./worker:/app/worker   # bind-mount: watchfiles restarts celery on any .py change
      - ./api:/app/api         # shared package imported by the worker pipeline
    depends_on:
      redis:
        condition: service_healthy
    networks: [embedbase_net]

  redis:
    image: redis:7.2-alpine
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks: [embedbase_net]

  chroma:
    image: chromadb/chroma:0.5.3
    volumes:
      - embedbase_data:/chroma/chroma
    environment:
      - CHROMA_SERVER_AUTHN_CREDENTIALS=${CHROMA_AUTH_TOKEN:-embedbase-internal}
      - CHROMA_SERVER_AUTHN_PROVIDER=chromadb.auth.token_authn.TokenAuthenticationServerProvider
      - CHROMA_AUTH_TOKEN_TRANSPORT_HEADER=Authorization
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks: [embedbase_net]

  nginx:
    build:
      context: ./ui
      dockerfile: Dockerfile
    ports:
      - "${UI_PORT:-3000}:80"
    depends_on:
      - api
    networks: [embedbase_net]
