name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  lint-and-type-check:
    name: Lint + type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r api/requirements.txt ruff mypy types-PyYAML types-redis
      - name: Ruff lint
        run: ruff check api/ worker/
      - name: Mypy
        run: mypy api/ worker/ --ignore-missing-imports --explicit-package-bases

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r api/requirements.txt pytest pytest-asyncio
      - name: Run unit tests
        run: pytest tests/unit/ -v

  docker-build:
    name: Docker build smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Copy config
        run: cp config.example.yaml config.yaml
      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: ./api
          tags: embedbase/api:ci
          load: true
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max
      - name: Build worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: worker/Dockerfile
          tags: embedbase/worker:ci
          load: true
          cache-from: type=gha,scope=worker
          cache-to: type=gha,scope=worker,mode=max
