name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  lint-and-type-check:
    name: Lint + type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r api/requirements.txt ruff mypy types-PyYAML types-redis
      - name: Ruff lint
        run: ruff check api/ worker/
      - name: Mypy
        run: mypy api/ worker/ --ignore-missing-imports --explicit-package-bases

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r api/requirements.txt pytest pytest-asyncio
      - name: Run unit tests
        run: pytest tests/unit/ -v

  integration-tests:
    name: Integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r api/requirements.txt pytest pytest-asyncio
      - name: Run integration tests
        run: pytest tests/integration/ -v

  docker-build:
    name: Docker build smoke test
    runs-on: ubuntu-latest
    env:
      DOCKER_BUILDKIT: "1"
    steps:
      - uses: actions/checkout@v4
      - name: Copy config
        run: cp config.example.yaml config.yaml
      # Build with the Docker daemon's built-in BuildKit (no docker-container
      # builder), so CI never pulls moby/buildkit from Docker Hub — that pull was
      # timing out ("context deadline exceeded"). Both images are slim
      # (INSTALL_ML=false), so the cross-run GHA layer cache we dropped here saved
      # little versus the reliability and startup time it cost.
      - name: Build API image
        run: docker build -f api/Dockerfile --build-arg INSTALL_ML=false -t embedbase/api:ci ./api
      - name: Build worker image
        run: docker build -f worker/Dockerfile --build-arg INSTALL_ML=false -t embedbase/worker:ci .
