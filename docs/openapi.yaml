components:
  schemas:
    APIKeyCreate:
      properties:
        label:
          type: string
          title: Label
          default: ''
      type: object
      title: APIKeyCreate
      description: Body for POST /workspaces/{ws_id}/collections/{col_id}/keys.
    AppConfig:
      properties:
        embedding:
          $ref: '#/components/schemas/EmbeddingConfig'
          default:
            provider: ollama
            model: embeddinggemma
            batch_size: 32
            concurrency: 8
        vector_store:
          $ref: '#/components/schemas/VectorStoreConfig'
          default:
            backend: chroma
            chroma:
              auth_token: embedbase-internal
              host: chroma
              port: 8000
            pgvector:
              database: embedbase
              host: postgres
              index_min_rows: 100
              password: ''
              port: 5432
              user: embedbase
            qdrant:
              host: qdrant
              port: 6333
        chunking:
          $ref: '#/components/schemas/ChunkingConfig'
          default:
            sliding_window:
              max_tokens: 512
              overlap_tokens: 64
            csv:
              rows_per_chunk: 10
            code:
              fallback_window_lines: 50
              max_symbol_tokens: 4096
        parsers:
          $ref: '#/components/schemas/ParserConfig'
          default:
            pdf_backend: pymupdf
            docling_ocr: false
            docling_ocr_engine: easyocr
            docling_tables: true
            docling_device: cpu
            docling_flash_attention: false
            docling_ocr_batch_size: 8
            docling_layout_batch_size: 8
        search:
          $ref: '#/components/schemas/SearchConfig'
          default:
            default_top_k: 5
            max_top_k: 20
            retrieval_fan_out: 4
            max_fan_out: 10
            hybrid_default_alpha: 0.7
            bm25_cache_ttl: 60
        mcp:
