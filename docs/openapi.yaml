      description: "Run a hybrid (semantic + BM25) search across one or more collections.\n\
        \nArgs:\n    request: Search parameters including query, collection IDs, and\
        \ filters.\n    db: Injected async database session for collection metadata.\n\
        \    _principal: Authenticated master principal (enforces auth, value unused).\n\
        \    embedder: Embedding adapter injected via Depends.\n    vector_store:\
        \ Vector store adapter injected via Depends.\n    redis_client: Redis client\
        \ injected via Depends (raises 503 if not ready).\n\nReturns:\n    SearchResponse\
        \ with ranked results and per-collection stats."
